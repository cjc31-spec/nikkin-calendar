name: 月次カレンダー差し替え

# 毎月最終営業日17:00 JST (08:00 UTC) に実行
# cron は月末付近の平日に毎日実行し、スクリプト内で最終営業日か判定
on:
  schedule:
    # 毎月26日〜31日の08:00 UTC (17:00 JST) に実行
    - cron: '0 8 26-31 * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jpholiday

      - name: Check if today is last business day & update calendar
        run: python3 scripts/update_calendar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images/calendar.png
          git diff --staged --quiet || git commit -m "カレンダー画像を更新（自動）" && git push
